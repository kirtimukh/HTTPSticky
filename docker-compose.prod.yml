services:
  redis:
    image: redis:latest
    volumes:
      - ./redis_data:/data
    networks:
      - internal

  app1:
    image: echo
    depends_on:
      - redis
    environment:
      - APP_ID=app-1
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    networks:
      - internal

  app2:
    image: echo
    depends_on:
      - redis
    environment:
      - APP_ID=app-2
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    networks:
      - internal

  app3:
    image: echo
    depends_on:
      - redis
    environment:
      - APP_ID=app-3
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    networks:
      - internal

  nginx:
    image: nginx:latest
    depends_on:
      - app1
      - app2
      - app3
    ports:
      - "8100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
