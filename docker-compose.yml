services:
  redis:
    image: redis:8.6.4-alpine
    volumes:
      - ./redis_data:/data
    networks:
      - internal

  # app:
  #   build:
  #     context: .
  #   ports:
  #     - 8000:8000
  #   volumes:
  #     - .:/app
  #   depends_on:
  #     - redis
  #   command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--workers", "4"]

  #   networks:
  #     - internal
  
  app1:
    build:
      context: .
    depends_on:
      - redis
    environment:
      - APP_ID=app-1
    volumes:
      - ./records.log:/tmp/records.log
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--reload"]
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    networks:
      - internal

  app2:
    build:
      context: .
    depends_on:
      - redis
    environment:
      - APP_ID=app-2
    volumes:
      - ./records.log:/tmp/records.log
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--reload"]
    networks:
      - internal

  app3:
    build:
      context: .
    depends_on:
      - redis
    environment:
      - APP_ID=app-3
    volumes:
      - ./records.log:/tmp/records.log
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--reload"]
    networks:
      - internal

  nginx:
    image: nginx:1.31.3-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
